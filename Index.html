<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackout League Manager</title>

    <link rel="manifest" href="data:application/manifest+json,{'name':'Blackout League','short_name':'Blackout','start_url':'.','display':'standalone','background_color':'#0d0d0d','theme_color':'#FFD700'}">
    <meta name="theme-color" content="#FFD700">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/FFD700/000000?text=B">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(0 0% 5%)',
                        foreground: 'hsl(0 0% 95%)',
                        card: { DEFAULT: 'hsl(0 0% 8%)', foreground: 'hsl(0 0% 95%)' },
                        primary: { DEFAULT: 'hsl(0 0% 98%)', foreground: 'hsl(0 0% 9%)' },
                        secondary: { DEFAULT: 'hsl(0 0% 12%)', foreground: 'hsl(0 0% 98%)' },
                        muted: { DEFAULT: 'hsl(0 0% 12%)', foreground: 'hsl(0 0% 65%)' },
                        border: 'hsl(0 0% 15%)',
                        papaya: '#FFD700',
                    },
                    borderRadius: { lg: '0.75rem', md: '0.5rem', sm: '0.25rem' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: hsl(0 0% 5%); color: hsl(0 0% 95%); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-clock { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: hsl(0 0% 15%); border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .modal-backdrop { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { animation: slideUp 0.3s ease-out forwards; }
        .toast-animate { animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .xp-gradient { background: linear-gradient(90deg, #FFD700 0%, #F59E0B 100%); }
        .sort-header { cursor: pointer; user-select: none; transition: background 0.2s; }
        .sort-header:hover { background: rgba(255, 255, 255, 0.05); }

        /* Rapid Fire View Utilities */
        .btn-rapid { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid hsl(0 0% 15%); border-radius: 1.5rem; transition: all 0.1s active:scale-95; }
        .btn-rapid:active { border-color: #FFD700; background: rgba(255, 215, 0, 0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm md:text-base selection:bg-papaya/30">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-16 lg:w-64 h-full bg-card border-r border-border flex flex-col transition-all z-50 shrink-0 shadow-2xl overflow-hidden">
        <div class="flex items-center gap-3 px-5 h-20 border-b border-border shrink-0 cursor-pointer" onclick="navigate('dashboard')">
            <div id="logo-container" class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center shrink-0 shadow-lg overflow-hidden">
                <span class="text-primary-foreground font-black text-lg">B</span>
            </div>
            <div class="overflow-hidden hidden lg:block">
                <h1 class="font-bold text-base leading-tight tracking-tight">BLACKOUT</h1>
                <p class="text-[10px] text-muted-foreground tracking-[0.2em] font-semibold uppercase">Pro League</p>
            </div>
        </div>

        <div class="p-4 border-b border-border hidden lg:block">
            <label class="text-[10px] font-bold text-muted-foreground uppercase tracking-widest mb-1.5 block px-2">Current League</label>
            <div class="relative">
                <select id="league-switcher" onchange="changeLeague(this.value)" class="w-full bg-secondary text-foreground border border-border rounded-lg py-2 px-3 text-xs font-semibold outline-none focus:ring-1 focus:ring-papaya/50 appearance-none cursor-pointer"></select>
                <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-muted-foreground"><i data-lucide="chevron-down" class="w-3.5 h-3.5"></i></div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar" id="nav-menu"></nav>

        <div class="p-3 border-t border-border" id="nav-admin"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="lg:hidden flex items-center justify-between px-4 h-14 border-b border-border bg-card shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center"><span class="text-primary-foreground font-black text-xs">B</span></div>
                <span class="font-bold text-sm">BLACKOUT</span>
            </div>
            <select id="mobile-league-switcher" onchange="changeLeague(this.value)" class="bg-secondary text-foreground border border-border rounded-md px-2 py-1 text-xs outline-none"></select>
        </header>

        <div id="app-view" class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="flex items-center justify-center h-full"><div class="w-10 h-10 border-4 border-primary/10 border-t-papaya rounded-full animate-spin"></div></div>
        </div>
    </main>

    <!-- UI COMPONENTS -->
    <div id="modal-root"></div>
    <div id="toast-root" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // ==========================================
        // 1. API & STATE
        // ==========================================
        const IS_GAS = typeof google !== 'undefined' && google.script && google.script.run;
        var CurrentUser = window.CurrentUser || { email: '', role: 'Guest', isAdmin: false, isScorekeeper: false };
        var AppState = { currentView: 'dashboard', currentParams: null, currentLeagueId: null, leagues: [], sort: { key: '', dir: 1 }, cachedStats: null };
        var MockData = window.MockData || { leagues: [], teams: [], players: [], games: [], events: [], divisions: [], gamesettings: [], rsvps: [] };

        var api = {
            call: (func, ...args) => new Promise((resolve, reject) => {
                if (IS_GAS) {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(err => {
                        Toast.show(err.message, 'error');
                        reject(err);
                    })[func](...args);
                } else {
                    setTimeout(() => {
                        const data = args[0];
                        if (func === 'getUserInfo') return resolve(window.CurrentUser || { email: 'dev@blackout.com', role: 'Admin', isAdmin: true, isScorekeeper: true });
                        if (func === 'GameEvent_all') return resolve(MockData.events || []);
                        const entity = func.split('_')[0];
                        const action = func.split('_')[1];
                        const tMap = { 'GameEvent': 'events', 'Player': 'players', 'GameSetting': 'gamesettings', 'RSVP': 'rsvps', 'Game': 'games', 'Team': 'teams', 'League': 'leagues', 'Lineup': 'lineups', 'Season': 'seasons', 'User': 'users', 'Division': 'divisions' };
                        let table = tMap[entity] || (entity.toLowerCase() + (entity.toLowerCase().endsWith('y') ? 'ies' : 's'));
                        if (action === 'create' || action === 'save') {
                            if (!data.id) data.id = 'n_' + Date.now();
                            const existingIdx = (MockData[table]||[]).findIndex(i => (i.id && i.id === data.id) || (entity === 'Lineup' && i.game_id === data.game_id && i.team_id === data.team_id));
                            if (existingIdx > -1) MockData[table][existingIdx] = {...MockData[table][existingIdx], ...data};
                            else { if(!MockData[table]) MockData[table] = []; MockData[table].push(data); }
                            return resolve(data);
                        }
                        if (action === 'filter') { let res = MockData[table] || []; for(let k in data) res = res.filter(i => i[k] == data[k]); return resolve(res); }
                        if (action === 'get') {
                            if (entity === 'Lineup') return resolve((MockData.lineups||[]).find(i => i.game_id === args[0] && i.team_id === args[1]));
                            return resolve((MockData[table]||[]).find(i => i.id == data));
                        }
                        if (func === 'Admin_RecordDelete') {
                            const t = tMap[args[0]] || args[0].toLowerCase() + 's';
                            if(MockData[t]) MockData[t] = MockData[t].filter(i => i.id !== args[1]);
                            return resolve({success:true});
                        }
                        resolve(MockData[table] || []);
                    }, 100);
                }
            })
        };

        const Toast = {
            show: (msg, type = 'info') => {
                const id = 't_' + Date.now();
                const colors = { info: 'bg-card border-border text-foreground', success: 'bg-green-500/10 border-green-500/20 text-green-400', error: 'bg-red-500/10 border-red-500/20 text-red-400' };
                const icon = { info: 'info', success: 'check-circle', error: 'alert-circle' }[type];
                const html = `<div id="${id}" class="toast-animate flex items-center gap-3 px-4 py-3 rounded-xl border shadow-2xl pointer-events-auto min-w-[280px] ${colors[type]}">
                    <i data-lucide="${icon}" class="w-5 h-5"></i><p class="text-sm font-bold flex-1">${msg}</p></div>`;
                document.getElementById('toast-root').insertAdjacentHTML('beforeend', html);
                lucide.createIcons();
                setTimeout(() => { document.getElementById(id)?.remove(); }, 4000);
            }
        };

        // ==========================================
        // 2. LOGIC
        // ==========================================
        const XP_THRESHOLDS = [0, 0, 50, 150, 300, 500, 800, 1200, 1800, 2500, 3500];
        const LEVEL_NAMES = { 1:'Rookie', 2:'Beginner', 3:'Regular', 4:'Veteran', 5:'Expert', 6:'Star', 7:'All-Star', 8:'Elite', 9:'Legend', 10:'GOAT' };
        function getLevel(xp=0) { for (let i = XP_THRESHOLDS.length-1; i>=0; i--) if (xp >= XP_THRESHOLDS[i]) return i === 0 ? 1 : i; return 1; }
        function getXpProgress(xp=0) { const l = getLevel(xp); if (l >= 10) return 100; return ((xp-XP_THRESHOLDS[l]) / (XP_THRESHOLDS[l+1]-XP_THRESHOLDS[l])) * 100; }
        function formatTime(s) { if (typeof s !== 'number' || isNaN(s)) return '00:00'; return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

        function sortData(arr, key) {
            if (AppState.sort.key === key) AppState.sort.dir *= -1;
            else { AppState.sort.key = key; AppState.sort.dir = 1; }
            return arr.sort((a,b) => {
                let v1 = a[key], v2 = b[key];
                if (typeof v1 === 'string') return v1.localeCompare(v2) * AppState.sort.dir;
                return (v1 - v2) * AppState.sort.dir;
            });
        }

        // ==========================================
        // 3. CORE UI
        // ==========================================
        async function loadLogo() {
            try {
                const leagues = await api.call('League_list');
                const league = leagues.find(l => l.id === AppState.currentLeagueId);
                // In real use, we might have a specific logo ID in the league object
                // For now, we keep the fallback 'B' or try to load if LOGO_DRIVE_ID existed
            } catch(e) {}
        }

        async function initApp() {
            try {
                CurrentUser = await api.call('getUserInfo');
                const leagues = await api.call('League_list');
                AppState.leagues = leagues || [];
                const visible = AppState.leagues.filter(l => l.is_visible !== false);
                if (!AppState.currentLeagueId) AppState.currentLeagueId = visible[0]?.id || AppState.leagues[0]?.id;
                renderLeagueSwitchers();
            } catch(e) { console.error("Init failed", e); }

            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'blackout-cache-v1';
                    self.addEventListener('install', (e) => {
                        e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(['./'])));
                    });
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW failed', err));
            }
            setTimeout(() => navigate(AppState.currentView, AppState.currentParams), 150);
        }

        function renderLeagueSwitchers() {
            const list = AppState.leagues.filter(l => l.is_visible !== false || l.id === AppState.currentLeagueId);
            const options = list.map(l => `<option value="${l.id}" ${l.id === AppState.currentLeagueId ? 'selected' : ''}>${l.name}</option>`).join('');
            document.getElementById('league-switcher').innerHTML = options;
            document.getElementById('mobile-league-switcher').innerHTML = options;
        }

        function changeLeague(id) { AppState.currentLeagueId = id; AppState.cachedStats = null; renderLeagueSwitchers(); navigate(AppState.currentView); }

        function renderNav() {
            const sections = [
                { label: 'General', items: [
                    { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                    { id: 'live', label: 'Live Games', icon: 'radio' },
                    { id: 'schedule', label: 'Schedule', icon: 'calendar' },
                    { id: 'archive', label: 'Archive', icon: 'archive' }
                ]},
                { label: 'Competition', items: [
                    { id: 'standings', label: 'Standings', icon: 'trophy' },
                    { id: 'stats', label: 'League Stats', icon: 'bar-chart-3' },
                    { id: 'bracket', label: 'Playoffs', icon: 'git-merge' },
                    { id: 'awards', label: 'Awards', icon: 'award' }
                ]},
                { label: 'Pro Tools', items: [
                    { id: 'analytics', label: 'Analytics', icon: 'trending-up' },
                    { id: 'compare', label: 'Compare', icon: 'users-2' },
                    { id: 'roster-mgmt', label: 'Roster Mgmt', icon: 'clipboard-list' }
                ]},
                { label: 'Account', items: [
                    { id: 'my-dashboard', label: 'Mijn Dashboard', icon: 'user-circle' },
                    { id: 'players', label: 'Directory', icon: 'book-open' }
                ]}
            ];

            let html = '';
            sections.forEach(sec => {
                html += `<div class="mt-4 mb-1 px-4 hidden lg:block text-[9px] font-black uppercase text-muted-foreground tracking-[0.2em]">${sec.label}</div>`;
                sec.items.forEach(item => {
                    const active = AppState.currentView === item.id;
                    html += `
                    <a href="#" onclick="navigate('${item.id}')"
                       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all mb-0.5
                       ${active ? 'bg-papaya/10 text-papaya shadow-[inset_0_0_0_1px_rgba(255,215,0,0.1)]' : 'text-muted-foreground hover:bg-secondary hover:text-foreground'}">
                        <i data-lucide="${item.icon}" class="w-5 h-5 shrink-0"></i><span class="hidden lg:block">${item.label}</span>
                    </a>`;
                });
            });
            document.getElementById('nav-menu').innerHTML = html;

            if (CurrentUser.isAdmin) {
                document.getElementById('nav-admin').innerHTML = `
                <div class="mb-1 px-4 hidden lg:block text-[9px] font-black uppercase text-muted-foreground tracking-[0.2em]">System</div>
                <a href="#" onclick="navigate('admin')"
                   class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all mb-0.5
                   ${AppState.currentView === 'admin' ? 'bg-primary/10 text-foreground' : 'text-muted-foreground hover:bg-secondary hover:text-foreground'}">
                    <i data-lucide="settings" class="w-5 h-5 shrink-0"></i><span class="hidden lg:block">Admin Panel</span>
                </a>
                <a href="#" onclick="navigate('db-console')"
                   class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all
                   ${AppState.currentView === 'db-console' ? 'bg-primary/10 text-foreground' : 'text-muted-foreground hover:bg-secondary hover:text-foreground'}">
                    <i data-lucide="database" class="w-5 h-5 shrink-0"></i><span class="hidden lg:block">DB Console</span>
                </a>`;
            } else {
                document.getElementById('nav-admin').innerHTML = '';
            }
            lucide.createIcons();
        }

        function setView(html) { document.getElementById('app-view').innerHTML = html; lucide.createIcons(); }

        function showModal(title, body, footer, large = false) {
            const html = `
            <div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/60 backdrop-blur-sm modal-backdrop" onclick="closeModal()"></div>
                <div class="relative bg-card rounded-2xl shadow-2xl w-full ${large ? 'max-w-4xl' : 'max-w-md'} border border-border overflow-hidden flex flex-col max-h-[90vh] modal-content">
                    <div class="px-6 py-4 border-b border-border flex justify-between items-center bg-card/50 shrink-0">
                        <h2 class="text-lg font-bold text-foreground">${title}</h2>
                        <button onclick="closeModal()" class="p-2 text-muted-foreground hover:bg-secondary hover:text-foreground rounded-md transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                    <div class="p-6 overflow-y-auto custom-scrollbar flex-1 text-sm">${body}</div>
                    ${footer ? `<div class="px-6 py-4 border-t border-border bg-card/30 flex justify-end gap-3 shrink-0">${footer}</div>` : ''}
                </div>
            </div>`;
            document.getElementById('modal-root').innerHTML = html;
            lucide.createIcons();
        }
        function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

        // ==========================================
        // 4. ADMIN & PRO FEATURES
        // ==========================================

        // --- GAME ROSTERS ---
        async function openRosterModal(gameId) {
            const [game, players, rsvps] = await Promise.all([
                api.call('Game_get', gameId),
                api.call('Player_list'),
                api.call('RSVP_filter', { game_id: gameId })
            ]);
            const rsvpMap = Object.fromEntries(rsvps.map(r => [r.player_id, r.status]));
            const homePlayers = players.filter(p => p.current_team_id === game.home_team_id);
            const awayPlayers = players.filter(p => p.current_team_id === game.away_team_id);

            const renderRoster = (plist, title) => `
                <h3 class="font-black text-xs uppercase tracking-widest text-papaya mb-3">${title}</h3>
                <div class="space-y-1 mb-6">
                    ${plist.map(p => `
                    <div class="flex items-center justify-between p-2 rounded-lg hover:bg-white/5 transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="w-6 font-mono text-[10px] text-muted-foreground">#${p.jersey_number||'?'}</span>
                            <span class="font-bold text-sm">${p.last_name}</span>
                        </div>
                        <select onchange="updateRosterStatus('${gameId}', '${p.id}', this.value)" class="bg-secondary border border-border rounded text-[10px] px-1.5 py-1 outline-none">
                            <option value="Out" ${rsvpMap[p.id] === 'Out' ? 'selected' : ''}>Out</option>
                            <option value="Active" ${(rsvpMap[p.id] || 'Active') === 'Active' ? 'selected' : ''}>Active</option>
                            <option value="Scratch" ${rsvpMap[p.id] === 'Scratch' ? 'selected' : ''}>Scratch</option>
                            <option value="Injured" ${rsvpMap[p.id] === 'Injured' ? 'selected' : ''}>Injured</option>
                        </select>
                    </div>`).join('')}
                </div>`;

            const body = `<div class="grid md:grid-cols-2 gap-8">${renderRoster(homePlayers, 'Home Roster')}${renderRoster(awayPlayers, 'Away Roster')}</div>`;
            showModal('Manage Game Roster', body, `<button onclick="closeModal()" class="px-5 py-2 bg-primary text-primary-foreground text-xs font-bold rounded-md">Done</button>`, true);
        }

        async function updateRosterStatus(gameId, playerId, status) {
            await api.call('RSVP_create', { game_id: gameId, player_id: playerId, status: status });
            Toast.show(`Player updated to ${status}`, 'success');
        }

        async function openSettingsModal() {
            const league = AppState.leagues.find(l => l.id === AppState.currentLeagueId);
            const isHidden = localStorage.getItem('hide_standard_league') === 'true';
            const body = `
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-1.5 px-1">League Name</label>
                        <input type="text" id="edit-league-name" value="${league?.name||''}" class="w-full bg-secondary border border-border rounded-lg py-2.5 px-4 outline-none focus:ring-1 focus:ring-papaya/50">
                    </div>
                    <div class="flex items-center justify-between p-4 bg-secondary/30 rounded-xl border border-border">
                        <div>
                            <h4 class="font-bold text-sm">Standard League Fallback</h4>
                            <p class="text-[10px] text-muted-foreground mt-1">Show built-in league when database is empty.</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="toggle-std-league" class="sr-only peer" ${!isHidden ? 'checked' : ''}>
                            <div class="w-10 h-5 bg-border rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-papaya"></div>
                        </label>
                    </div>
                </div>`;
            const footer = `<button onclick="closeModal()" class="px-5 py-2 text-xs font-bold text-muted-foreground">Cancel</button>
                <button onclick="saveSettings()" class="px-5 py-2 bg-papaya text-black text-xs font-bold rounded-md">Save Changes</button>`;
            showModal('League Settings', body, footer);
        }

        async function saveSettings() {
            const name = document.getElementById('edit-league-name').value;
            const isChecked = document.getElementById('toggle-std-league').checked;
            localStorage.setItem('hide_standard_league', !isChecked ? 'true' : 'false');
            if (name) await api.call('League_update', { id: AppState.currentLeagueId, name: name });
            Toast.show("Settings saved", "success");
            closeModal(); initApp();
        }

        async function openRulesModal() {
            const res = await api.call('GameSetting_get', AppState.currentLeagueId);
            const rules = res ? JSON.parse(res.settings_json) : { period_length: 20, periods: 3, penalty_minor: 2, penalty_major: 5 };
            const body = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-1.5 px-1">Period Length (min)</label>
                        <input type="number" id="rule-period-len" value="${rules.period_length}" class="w-full bg-secondary border border-border rounded-lg py-2 px-4 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-1.5 px-1">Number of Periods</label>
                        <input type="number" id="rule-periods" value="${rules.periods}" class="w-full bg-secondary border border-border rounded-lg py-2 px-4 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-1.5 px-1">Minor Penalty (min)</label>
                        <input type="number" id="rule-pen-minor" value="${rules.penalty_minor}" class="w-full bg-secondary border border-border rounded-lg py-2 px-4 outline-none">
                    </div>
                </div>`;

        async function viewStandings() {
            const [games, teams] = await Promise.all([ api.call('Game_list'), api.call('Team_list') ]);
            const st = {};
            teams.filter(t => t.league_id === AppState.currentLeagueId).forEach(t => st[t.id] = { t, gp:0, w:0, l:0, pts:0, gf:0, ga:0 });

            games.forEach(g => {
                if (g.status !== 'Final' || !st[g.home_team_id] || !st[g.away_team_id]) return;
                st[g.home_team_id].gp++; st[g.away_team_id].gp++;
                st[g.home_team_id].gf += g.home_score; st[g.home_team_id].ga += g.away_score;
                st[g.away_team_id].gf += g.away_score; st[g.away_team_id].ga += g.home_score;
                if (g.home_score > g.away_score) { st[g.home_team_id].w++; st[g.home_team_id].pts+=2; st[g.away_team_id].l++; }
                else if (g.away_score > g.home_score) { st[g.away_team_id].w++; st[g.away_team_id].pts+=2; st[g.home_team_id].l++; }
                else { st[g.home_team_id].pts++; st[g.away_team_id].pts++; }
            });

            const rows = Object.values(st).sort((a,b) => b.pts - a.pts).map((s, i) => `
                <tr class="border-t border-border hover:bg-white/5 transition-colors">
                    <td class="p-4 font-mono text-xs text-muted-foreground">${i+1}</td>
                    <td class="p-4 font-bold"><div class="flex items-center gap-3"><div class="w-6 h-6 rounded bg-secondary" style="background:${s.t.color}"></div>${s.t.name}</div></td>
                    <td class="p-4 text-center font-mono">${s.gp}</td>
                    <td class="p-4 text-center font-mono text-green-500">${s.w}</td>
                    <td class="p-4 text-center font-mono text-red-500">${s.l}</td>
                    <td class="p-4 text-center font-mono">${s.gf}-${s.ga}</td>
                    <td class="p-4 text-center font-mono font-black text-papaya">${s.pts}</td>
                </tr>`).join('');

            setView(`<div class="max-w-4xl mx-auto space-y-8"><h1 class="text-3xl font-black">Standings</h1><div class="bg-card border border-border rounded-2xl overflow-hidden"><table class="w-full text-left"><thead class="bg-secondary/50 text-[10px] font-black uppercase tracking-widest text-muted-foreground"><tr><th class="p-4">Pos</th><th class="p-4">Team</th><th class="p-4 text-center">GP</th><th class="p-4 text-center">W</th><th class="p-4 text-center">L</th><th class="p-4 text-center">+/-</th><th class="p-4 text-center">PTS</th></tr></thead><tbody>${rows}</tbody></table></div></div>`);
        }

        async function viewStats(sortKey) {
            if (!sortKey || !AppState.cachedStats) {
                const [players, teams, events, games] = await Promise.all([ api.call('Player_list'), api.call('Team_list'), api.call('GameEvent_all'), api.call('Game_list') ]);
                const tm = Object.fromEntries(teams.map(t => [t.id, t]));
                const relevant = players.filter(p => !p.current_team_id || (tm[p.current_team_id] && tm[p.current_team_id].league_id === AppState.currentLeagueId));

                const sm = {};
                relevant.forEach(p => sm[p.id] = { ...p, gp: 0, g:0, a:0, pts:0, shots_against:0, goals_against:0, wins:0, shutouts:0, team: tm[p.current_team_id] });

                const leagueGames = games.filter(g => g.league_id === AppState.currentLeagueId);

                const rsvps = await api.call('RSVP_list');
                leagueGames.forEach(g => {
                    if (g.status !== 'Final') return;
                    const activeInGame = rsvps.filter(r => r.game_id === g.id && r.status === 'Active').map(r => r.player_id);
                    activeInGame.forEach(pid => { if (sm[pid]) sm[pid].gp++; });

                    const homeGoalie = relevant.find(p => p.current_team_id === g.home_team_id && p.position === 'G');
                    const awayGoalie = relevant.find(p => p.current_team_id === g.away_team_id && p.position === 'G');
                    if (homeGoalie && sm[homeGoalie.id]) { if (g.home_score > g.away_score) sm[homeGoalie.id].wins++; if (g.away_score === 0) sm[homeGoalie.id].shutouts++; }
                    if (awayGoalie && sm[awayGoalie.id]) { if (g.away_score > g.home_score) sm[awayGoalie.id].wins++; if (g.home_score === 0) sm[awayGoalie.id].shutouts++; }
                });

                events.forEach(e => {
                    if (e.event_type === 'Goal') {
                        if (sm[e.player_id]) { sm[e.player_id].g++; sm[e.player_id].pts++; }
                        if (sm[e.assist1_player_id]) { sm[e.assist1_player_id].a++; sm[e.assist1_player_id].pts++; }
                        if (sm[e.assist2_player_id]) { sm[e.assist2_player_id].a++; sm[e.assist2_player_id].pts++; }
                    }
                    if (e.event_type === 'Goal' || e.event_type === 'Shot') {
                        const g = leagueGames.find(game => game.id === e.game_id);
                        if (g) {
                            const targetTeam = e.team_id === g.home_team_id ? g.away_team_id : g.home_team_id;
                            const goalie = relevant.find(p => p.current_team_id === targetTeam && p.position === 'G');
                            if (goalie && sm[goalie.id]) {
                                sm[goalie.id].shots_against++;
                                if (e.event_type === 'Goal') sm[goalie.id].goals_against++;
                            }
                        }
                    }
                });
                AppState.cachedStats = Object.values(sm);
            }

            let sorted = [...AppState.cachedStats];
            if (sortKey) sorted = sortData(sorted, sortKey);
            else sorted = sorted.sort((a,b) => b.pts - a.pts);

            const rows = sorted.map((p, i) => {
                const team = tm[p.current_team_id];
                const isG = p.position === 'G';
                let specialStat = '-';
                if (isG) {
                    const sv = p.shots_against > 0 ? (((p.shots_against - p.goals_against)/p.shots_against)*100).toFixed(1) + '%' : '.000';
                    const gaa = p.gp > 0 ? (p.goals_against / p.gp).toFixed(2) : '0.00';
                    specialStat = `<div class="flex flex-col items-end gap-0.5"><span class="text-blue-400 font-mono text-[10px]">SV: ${sv} · GAA: ${gaa}</span><span class="text-papaya font-mono text-[10px]">W: ${p.wins} · SO: ${p.shutouts}</span></div>`;
                } else {
                    specialStat = `<span class="text-muted-foreground font-mono text-[10px]">P/G: ${(p.pts/(p.gp||1)).toFixed(2)}</span>`;
                }

                return `<tr class="border-t border-border hover:bg-secondary/30 transition-colors cursor-pointer" onclick="navigate('playerStats', '${p.id}')">
                    <td class="p-4 text-muted-foreground font-mono text-xs">${i+1}</td>
                    <td class="p-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded bg-secondary flex items-center justify-center font-mono font-black text-xs">${p.jersey_number||'?'}</div><div><p class="font-bold text-sm leading-none">${p.first_name} ${p.last_name}</p><p class="text-[9px] text-muted-foreground uppercase mt-1 tracking-widest">${p.position||'UNK'} · ${team?.short_name||'FA'}</p></div></div></td>
                    <td class="p-4 text-center font-mono text-xs">${p.gp}</td>
                    <td class="p-4 text-center font-mono text-sm font-black text-papaya">${p.pts}</td>
                    <td class="p-4 text-center font-mono text-xs">${p.g}</td>
                    <td class="p-4 text-center font-mono text-xs">${p.a}</td>
                    <td class="p-4 text-right">${specialStat}</td>
                </tr>`;
            }).join('');

            setView(`
                <div class="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                    <h1 class="text-3xl font-black">Pro Player Stats</h1>
                    <div class="bg-card border border-border rounded-xl overflow-hidden shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-secondary/50 text-[9px] font-black uppercase tracking-widest text-muted-foreground">
                                <tr>
                                    <th class="p-4 w-12">#</th>
                                    <th class="p-4 sort-header" onclick="viewStats('last_name')">Player</th>
                                    <th class="p-4 text-center sort-header" onclick="viewStats('gp')">GP</th>
                                    <th class="p-4 text-center sort-header" onclick="viewStats('pts')">PTS</th>
                                    <th class="p-4 text-center">G</th><th class="p-4 text-center">A</th>
                                    <th class="p-4 text-right">Advanced</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>`);
        }

        async function viewAnalytics() {
            const [events, games, players] = await Promise.all([ api.call('GameEvent_all'), api.call('Game_list'), api.call('Player_list') ]);
            const leagueGames = games.filter(g => g.league_id === AppState.currentLeagueId);
            const lgEvents = events.filter(e => leagueGames.find(g => g.id === e.game_id));

            const goalCount = lgEvents.filter(e => e.event_type === 'Goal').length;
            const penaltyCount = lgEvents.filter(e => e.event_type === 'Penalty').length;

            // Calculate real trend: goals per week
            const weekGoals = {};
            leagueGames.forEach(g => {
                if (!g.scheduled_date) return;
                const date = new Date(g.scheduled_date);
                const weekNum = Math.ceil((date.getDate() + date.getDay()) / 7); // Simplified week of month
                const month = date.toLocaleString('default', { month: 'short' });
                const key = `${month} W${weekNum}`;
                const gEvents = lgEvents.filter(e => e.game_id === g.id && e.event_type === 'Goal');
                weekGoals[key] = (weekGoals[key] || 0) + gEvents.length;
            });

            const trendKeys = Object.keys(weekGoals).sort((a, b) => new Date(a) - new Date(b)).slice(-7);
            const maxGoals = Math.max(...Object.values(weekGoals), 1);
            const trend = trendKeys.length > 0 ? trendKeys.map(k => `
                <div class="flex-1 flex flex-col items-center justify-end group">
                    <div class="w-full bg-papaya/20 group-hover:bg-papaya/40 rounded-t-sm transition-all" style="height: ${(weekGoals[k]/maxGoals)*100}px"></div>
                    <span class="text-[8px] font-black mt-2 text-muted-foreground uppercase">${k}</span>
                </div>`).join('') : '<p class="text-center w-full text-muted-foreground text-xs italic">Not enough game data for trend.</p>';

            setView(`
                <div class="max-w-5xl mx-auto space-y-8 animate-in fade-in duration-500">
                    <h1 class="text-3xl font-black">League Analytics</h1>
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="bg-card border border-border p-8 rounded-3xl text-center"><p class="text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-2">Total Goals</p><p class="text-5xl font-black text-papaya">${goalCount}</p></div>
                        <div class="bg-card border border-border p-8 rounded-3xl text-center"><p class="text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-2">Penalties</p><p class="text-5xl font-black text-red-500">${penaltyCount}</p></div>
                        <div class="bg-card border border-border p-8 rounded-3xl text-center"><p class="text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-2">Avg Goals/Game</p><p class="text-5xl font-black">${(goalCount/(games.length||1)).toFixed(1)}</p></div>
                    </div>
                    <div class="bg-card border border-border p-10 rounded-3xl">
                        <h3 class="text-sm font-black uppercase tracking-widest mb-10 text-center">Scoring Trend (Weekly)</h3>
                        <div class="h-40 flex items-end gap-2 px-10">${trend}</div>
                    </div>
                </div>`);
        }

                <div class="bg-card border-2 ${i===0 ? 'border-papaya' : 'border-border'} p-8 rounded-3xl text-center relative overflow-hidden group">
                    ${i === 0 ? '<div class="absolute top-4 right-4"><i data-lucide="crown" class="w-6 h-6 text-papaya animate-bounce"></i></div>' : ''}
                    <div class="w-20 h-20 rounded-full mx-auto mb-6 flex items-center justify-center text-3xl font-black bg-secondary shadow-2xl">${p.jersey_number||'?'}</div>
                    <h3 class="font-black text-xl mb-1">${p.first_name} ${p.last_name}</h3>
                    <p class="text-[10px] font-black uppercase text-papaya tracking-[0.2em] mb-6">${i === 0 ? 'LEAGUE MVP' : i === 1 ? 'TOP SCORER' : 'ALL-STAR'}</p>
                    <div class="flex justify-center gap-4 border-t border-white/5 pt-6">
                        <div><p class="text-xs text-muted-foreground uppercase font-black">Points</p><p class="text-xl font-black">${p.pts}</p></div>
                        <div class="w-px h-8 bg-border"></div>
                        <div><p class="text-xs text-muted-foreground uppercase font-black">Goals</p><p class="text-xl font-black">${p.g}</p></div>
                    </div>
                `;
            }).join('');

            setView(`<div class="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500"><h1 class="text-3xl font-black">League Awards</h1><div class="grid md:grid-cols-3 gap-8">${awardCards}</div></div>`);
        }

        async function viewArchive() {
            const games = await api.call('Game_filter', { league_id: AppState.currentLeagueId, status: 'Final' });
            const teams = await api.call('Team_list');
            const tm = Object.fromEntries(teams.map(t => [t.id, t]));

            const list = games.map(g => `
                <div class="bg-card border border-border p-5 rounded-2xl flex items-center justify-between mb-4 group hover:border-papaya/30 transition-all">
                    <div class="flex items-center gap-6">
                        <div class="text-center pr-6 border-r border-border min-w-[80px]">
                            <p class="font-black text-sm">${new Date(g.scheduled_date).toLocaleDateString()}</p>
                            <p class="text-[9px] font-black uppercase text-muted-foreground mt-1 tracking-widest">${g.game_type}</p>
                        </div>
                        <div>
                            <p class="font-black text-lg">${tm[g.home_team_id]?.short_name} ${g.home_score} - ${g.away_score} ${tm[g.away_team_id]?.short_name}</p>
                            <p class="text-xs text-muted-foreground">${g.venue}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="navigate('gameAnalysis', '${g.id}')" class="p-2 bg-secondary text-muted-foreground rounded-lg hover:text-papaya"><i data-lucide="line-chart" class="w-4 h-4"></i></button>
                        <button onclick="window.print()" class="p-2 bg-secondary text-muted-foreground rounded-lg hover:text-papaya"><i data-lucide="file-text" class="w-4 h-4"></i></button>
                    </div>
                </div>`).join('');

            setView(`<div class="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-500"><h1 class="text-3xl font-black">Game Sheet Archive</h1><div class="space-y-4">${list || '<p class="text-center py-20 text-muted-foreground">No archived games found.</p>'}</div></div>`);
        }

        async function viewDbConsole() {
            const tables = ['League', 'Team', 'Player', 'Game', 'GameEvent', 'Division', 'User', 'Season'];
            const renderTable = async (name) => {
                const data = await api.call(name + '_list');
                const headers = data.length > 0 ? Object.keys(data[0]) : [];
                return `
                <div class="space-y-4">
                    <h3 class="font-black text-papaya uppercase tracking-widest text-xs">${name} Records</h3>
                    <div class="bg-card border border-border rounded-xl overflow-x-auto">
                        <table class="w-full text-[10px]">
                            <thead class="bg-secondary/50 text-muted-foreground uppercase font-black">
                                <tr>${headers.map(h => `<th class="p-3 text-left">${h}</th>`).join('')}<th class="p-3"></th></tr>
                            </thead>
                            <tbody>
                                ${data.map(row => `
                                <tr class="border-t border-white/5 hover:bg-white/5">
                                    ${headers.map(h => `<td class="p-3 truncate max-w-[150px]">${row[h]}</td>`).join('')}
                                    <td class="p-3 text-right"><button onclick="deleteRecord('${name}', '${row.id}')" class="text-red-500 hover:text-red-400 p-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            };

            window.deleteRecord = async (table, id) => {
                if(!confirm('Are you sure?')) return;
                await api.call('Admin_RecordDelete', table, id);
                Toast.show('Record deleted', 'success');
                viewDbConsole();
            };

            const html = (await Promise.all(tables.map(t => renderTable(t)))).join('<div class="h-10"></div>');
            setView(`<div class="max-w-6xl mx-auto space-y-10 animate-in fade-in duration-500"><h1 class="text-3xl font-black">Database Console</h1><div class="pb-20">${html}</div></div>`);
        }

        async function viewRosterManagement() {
            const [teams, players, games] = await Promise.all([
                api.call('Team_filter', { league_id: AppState.currentLeagueId }),
                api.call('Player_list'),
                api.call('Game_filter', { league_id: AppState.currentLeagueId, status: 'Scheduled' })
            ]);

            if (games.length === 0) return setView(`<div class="flex flex-col items-center justify-center h-full text-muted-foreground"><i data-lucide="clipboard-list" class="w-12 h-12 mb-4 opacity-20"></i><p class="font-bold">No upcoming games to manage lineups for.</p></div>`);

            const game = games[0];
            const h = teams.find(t => t.id === game.home_team_id);
            const a = teams.find(t => t.id === game.away_team_id);

            const renderLineupEditor = async (team) => {
                if(!team) return '';
                const teamPlayers = players.filter(p => p.current_team_id === team.id);
                const lineupRes = await api.call('Lineup_get', game.id, team.id);
                const lines = lineupRes ? JSON.parse(lineupRes.lineup_json) : { L1: [], L2: [], G: [] };

                return `
                <div class="bg-card border border-border rounded-3xl p-6 space-y-6">
                    <div class="flex items-center gap-3 border-b border-white/5 pb-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black" style="background:${team.color}">${team.short_name[0]}</div>
                        <h3 class="font-black uppercase tracking-widest">${team.name}</h3>
                    </div>

                    <div class="space-y-4">
                        ${['G', 'L1', 'L2'].map(line => `
                            <div class="space-y-2">
                                <p class="text-[9px] font-black text-papaya uppercase tracking-widest">${line === 'G' ? 'Goalies' : 'Line ' + line.slice(1)}</p>
                                <div class="min-h-[40px] bg-secondary/20 rounded-xl border border-dashed border-white/10 p-2 flex flex-wrap gap-2">
                                    ${lines[line].map(pid => {
                                        const p = players.find(x => x.id === pid);
                                        return `<span class="bg-secondary px-2 py-1 rounded text-[10px] font-bold">#${p?.jersey_number} ${p?.last_name}</span>`;
                                    }).join('') || '<span class="text-[9px] text-muted-foreground px-2">Empty</span>'}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <button onclick="openLineupModal('${game.id}', '${team.id}')" class="w-full py-2 bg-secondary hover:bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors">Edit Lineup</button>
                </div>`;
            };

            const lineupGrid = (await Promise.all([renderLineupEditor(h), renderLineupEditor(a)])).join('');
            setView(`
                <div class="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                    <div class="flex justify-between items-center">
                        <h1 class="text-3xl font-black">Line Management</h1>
                        <div class="bg-secondary px-4 py-2 rounded-full text-xs font-bold text-muted-foreground">${new Date(game.scheduled_date).toLocaleDateString()} Match</div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-8">${lineupGrid}</div>
                </div>`);
        }

        async function openLineupModal(gameId, teamId) {
            const [players, lineupRes] = await Promise.all([ api.call('Player_list'), api.call('Lineup_get', gameId, teamId) ]);
            const teamPlayers = players.filter(p => p.current_team_id === teamId);
            const current = lineupRes ? JSON.parse(lineupRes.lineup_json) : { L1: [], L2: [], G: [] };

            const body = `
                <div class="space-y-6">
                    ${['G', 'L1', 'L2'].map(line => `
                        <div>
                            <label class="block text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-2">${line === 'G' ? 'Goalies' : 'Line ' + line.slice(1)}</label>
                            <select id="sel-${line}" multiple class="w-full bg-secondary border border-border rounded-xl p-3 text-xs h-24 outline-none focus:ring-1 focus:ring-papaya/50">
                                ${teamPlayers.map(p => `<option value="${p.id}" ${current[line].includes(p.id) ? 'selected' : ''}>#${p.jersey_number} ${p.last_name}</option>`).join('')}
                            </select>
                        </div>
                    `).join('')}
                </div>`;

            const footer = `<button onclick="closeModal()" class="px-5 py-2 text-xs font-bold text-muted-foreground">Cancel</button>
                <button onclick="saveLineup('${gameId}', '${teamId}')" class="px-5 py-2 bg-papaya text-black text-xs font-bold rounded-md">Save Lineup</button>`;

            showModal('Assign Lines', body, footer);
        }

        async function saveLineup(gameId, teamId) {
            const getSelected = (id) => Array.from(document.getElementById(id).selectedOptions).map(o => o.value);
            const lineup = {
                G: getSelected('sel-G'),
                L1: getSelected('sel-L1'),
                L2: getSelected('sel-L2')
            };
            await api.call('Lineup_save', { game_id: gameId, team_id: teamId, lineup_json: JSON.stringify(lineup) });
            Toast.show('Lineup saved', 'success');
            closeModal();
            viewRosterManagement();
        }

        async function viewGameAnalysis(gameId) {
            const [game, events, teams, players] = await Promise.all([
                api.call('Game_get', gameId),
                api.call('GameEvent_filter', { game_id: gameId }),
                api.call('Team_list'),
                api.call('Player_list')
            ]);
            if (!game) return setView('<div class="flex flex-col items-center justify-center h-full text-muted-foreground"><p class="font-bold">Wedstrijd niet gevonden.</p></div>');
            const tm = Object.fromEntries(teams.map(t => [t.id, t]));
            const pm = Object.fromEntries(players.map(p => [p.id, p]));
            const h = tm[game.home_team_id], a = tm[game.away_team_id];

            const goals = events.filter(e => e.event_type === 'Goal');
            const pens = events.filter(e => e.event_type === 'Penalty');

            const renderEventList = (list, title, empty) => `
                <div class="bg-card border border-border rounded-2xl p-6">
                    <h4 class="text-[10px] font-black uppercase text-muted-foreground tracking-widest mb-4 border-b border-white/5 pb-2">${title}</h4>
                    <div class="space-y-3">
                        ${list.map(e => `
                        <div class="flex justify-between items-center text-sm">
                            <div class="flex items-center gap-3">
                                <span class="w-8 font-mono text-[10px] text-muted-foreground">P${e.period}</span>
                                <span class="font-bold">${pm[e.player_id]?.last_name || 'Unk'} ${e.assist1_player_id ? '(Assists: ' + pm[e.assist1_player_id]?.last_name + (e.assist2_player_id ? ', ' + pm[e.assist2_player_id]?.last_name : '') + ')' : ''}</span>
                            </div>
                            <span class="text-[10px] font-black ${e.event_type === 'Goal' ? 'text-papaya' : 'text-red-400'}">${e.event_type === 'Goal' ? 'G' : 'PEN'}</span>
                        </div>`).join('') || `<p class="text-center text-[10px] text-muted-foreground py-4">${empty}</p>`}
                    </div>
                </div>`;

            setView(`
                <div class="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-500">
                    <button onclick="navigate('archive')" class="flex items-center gap-2 text-xs font-bold text-muted-foreground hover:text-white transition-colors"><i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Archive</button>

                    <div class="bg-card border border-border rounded-3xl p-10 text-center shadow-2xl relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
                        <p class="text-[10px] font-black uppercase text-papaya tracking-[0.4em] mb-6">Match Analysis</p>
                        <div class="flex items-center justify-between">
                            <div class="flex-1 text-right pr-10 border-r border-white/5">
                                <p class="text-5xl font-black mb-2">${game.home_score}</p>
                                <p class="font-bold uppercase tracking-widest text-muted-foreground">${h?.name}</p>
                            </div>
                            <div class="flex-1 text-left pl-10">
                                <p class="text-5xl font-black mb-2">${game.away_score}</p>
                                <p class="font-bold uppercase tracking-widest text-muted-foreground">${a?.name}</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        ${renderEventList(goals, 'Goal Summary', 'No goals scored.')}
                        ${renderEventList(pens, 'Penalty Summary', 'Clean game - no penalties.')}
                    </div>
                </div>`);
        }

        // ==========================================
        // 6. ROUTER & BOOTSTRAP
        // ==========================================
        async function navigate(view, params = null) {
            if (['admin'].includes(view) && !CurrentUser.isAdmin) { Toast.show("Access Denied", "error"); return; }
            AppState.currentView = view; AppState.currentParams = params; renderNav();
            document.getElementById('app-view').innerHTML = `<div class="flex items-center justify-center h-full"><div class="w-10 h-10 border-4 border-primary/10 border-t-papaya rounded-full animate-spin"></div></div>`;
            try {
                if (view === 'dashboard') await viewDashboard();
                else if (view === 'admin') await viewAdmin();
                else if (view === 'live') await viewLiveGames();
                else if (view === 'gameDetail') await viewGameDetail(params);
                else if (view === 'standings') await viewStandings();
                else if (view === 'players') await viewPlayers();
                else if (view === 'playerStats') await viewPlayerStats(params);
                else if (view === 'stats') await viewStats();
                else if (view === 'bracket') await viewBracket();
                else if (view === 'teams') await viewTeams();
                else if (view === 'schedule') await viewSchedule();
                else if (view === 'archive') await viewArchive();
                else if (view === 'awards') await viewAwards();
                else if (view === 'analytics') await viewAnalytics();
                else if (view === 'compare') await viewCompare();
                else if (view === 'roster-mgmt') await viewRosterManagement();
                else if (view === 'my-dashboard') await viewMyDashboard();
                else if (view === 'db-console') await viewDbConsole();
                else if (view === 'season-mgmt') await viewSeasonManagement();
                else if (view === 'gameAnalysis') await viewGameAnalysis(params);
                else await viewDashboard();
            } catch (err) { console.error(err); Toast.show(err.message, 'error'); }
            lucide.createIcons(); document.getElementById('app-view').scrollTo(0,0);
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
