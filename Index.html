<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackout League Manager</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- SCRIPTS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(0 0% 5%)',
                        foreground: 'hsl(0 0% 95%)',
                        card: {
                            DEFAULT: 'hsl(0 0% 8%)',
                            foreground: 'hsl(0 0% 95%)'
                        },
                        popover: {
                            DEFAULT: 'hsl(0 0% 5%)',
                            foreground: 'hsl(0 0% 95%)'
                        },
                        primary: {
                            DEFAULT: 'hsl(0 0% 98%)',
                            foreground: 'hsl(0 0% 9%)'
                        },
                        secondary: {
                            DEFAULT: 'hsl(0 0% 12%)',
                            foreground: 'hsl(0 0% 98%)'
                        },
                        muted: {
                            DEFAULT: 'hsl(0 0% 12%)',
                            foreground: 'hsl(0 0% 65%)'
                        },
                        accent: {
                            DEFAULT: 'hsl(0 0% 15%)',
                            foreground: 'hsl(0 0% 98%)'
                        },
                        border: 'hsl(0 0% 15%)',
                        papaya: '#FFD700',
                    },
                    borderRadius: {
                        lg: '0.75rem',
                        md: 'calc(0.75rem - 2px)',
                        sm: 'calc(0.75rem - 4px)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: hsl(0 0% 5%); color: hsl(0 0% 95%); font-family: 'Inter', sans-serif; }
        .font-clock { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: hsl(0 0% 15%); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: hsl(0 0% 25%); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-backdrop { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { animation: slideUp 0.3s ease-out forwards; }
        .xp-gradient { background: linear-gradient(90deg, #FFD700 0%, #F59E0B 100%); }
        table { border-collapse: separate; border-spacing: 0; }
        th { font-weight: 700; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm md:text-base selection:bg-papaya/30">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-16 lg:w-64 h-full bg-card border-r border-border flex flex-col transition-all z-50 shrink-0 shadow-2xl overflow-hidden">
        <div class="flex items-center gap-3 px-5 h-20 border-b border-border shrink-0 cursor-pointer" onclick="navigate('dashboard')">
            <div id="logo-container" class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center shrink-0 shadow-lg shadow-white/5 overflow-hidden">
                <span class="text-primary-foreground font-black text-lg">B</span>
            </div>
            <div class="overflow-hidden hidden lg:block">
                <h1 class="font-bold text-base leading-tight tracking-tight text-foreground">BLACKOUT</h1>
                <p class="text-[10px] text-muted-foreground tracking-[0.2em] font-semibold uppercase">League Manager</p>
            </div>
        </div>

        <!-- LEAGUE SWITCHER -->
        <div class="p-4 border-b border-border hidden lg:block">
            <label class="text-[10px] font-bold text-muted-foreground uppercase tracking-widest mb-1.5 block px-2">Current League</label>
            <div class="relative">
                <select id="league-switcher" onchange="changeLeague(this.value)" class="w-full bg-secondary text-foreground border border-border rounded-lg py-2 px-3 text-xs font-semibold outline-none focus:ring-1 focus:ring-papaya/50 appearance-none cursor-pointer transition-all">
                    <option value="">Loading...</option>
                </select>
                <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-muted-foreground">
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar" id="nav-menu"></nav>

        <div class="p-3 border-t border-border" id="nav-admin"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="lg:hidden flex items-center justify-between px-4 h-14 border-b border-border bg-card shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
                    <span class="text-primary-foreground font-black text-xs">B</span>
                </div>
                <span class="font-bold text-sm tracking-wide">BLACKOUT</span>
            </div>
            <select id="mobile-league-switcher" onchange="changeLeague(this.value)" class="bg-secondary text-foreground border border-border rounded-md px-2 py-1 text-xs font-semibold outline-none"></select>
        </header>

        <div id="app-view" class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            <div class="flex items-center justify-center h-full">
                <div class="w-8 h-8 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <!-- MODAL ROOT -->
    <div id="modal-root"></div>

    <script>
        // ==========================================
        // 1. API & STATE
        // ==========================================
        const IS_GAS = typeof google !== 'undefined' && google.script && google.script.run;
        const LOGO_DRIVE_ID = '';

        const HARDCODED_LEAGUE = { id: 'league_standard', name: 'Standard League (Local)', level: 0, is_visible: true };
        const HARDCODED_TEAMS = [
            { id: 'team_std_1', league_id: 'league_standard', parent_team_id: null, name: 'Red Falcons', short_name: 'RED', color: '#ef4444' },
            { id: 'team_std_2', league_id: 'league_standard', parent_team_id: null, name: 'Blue Sharks', short_name: 'BLU', color: '#3b82f6' }
        ];
        const HARDCODED_PLAYERS = [
            { id: 'p_s1', current_team_id: 'team_std_1', first_name: 'Falcon', last_name: 'Forward 1', jersey_number: 10, position: 'F', xp: 450, stick_model: 'Bauer Vapor', training_total: 10, training_attended: 9, games_played: 5 },
            { id: 'p_s2', current_team_id: 'team_std_1', first_name: 'Falcon', last_name: 'Forward 2', jersey_number: 11, position: 'F', xp: 200, stick_model: 'CCM Ribcor', training_total: 10, training_attended: 5, games_played: 5 },
            { id: 'p_s6', current_team_id: 'team_std_1', first_name: 'Falcon', last_name: 'Goalie', jersey_number: 30, position: 'G', xp: 0, stick_model: 'Bauer Supreme', training_total: 10, training_attended: 10, games_played: 5 },
            { id: 'p_s7', current_team_id: 'team_std_2', first_name: 'Shark', last_name: 'Forward 1', jersey_number: 10, position: 'F', xp: 0, stick_model: 'True Catalyst', training_total: 10, training_attended: 7, games_played: 5 }
        ];

        let MockData = { leagues: [], teams: [], players: [], games: [], events: [], divisions: [], gamesettings: [] };

        const api = {
            call: (func, data) => new Promise((resolve, reject) => {
                const processResult = (result) => {
                    if (func === 'League_list') {
                        const isHidden = localStorage.getItem('hide_standard_league') === 'true';
                        HARDCODED_LEAGUE.is_visible = !isHidden;
                        if (!result.find(l => l.id === 'league_standard')) result.unshift(HARDCODED_LEAGUE);
                    }
                    if ((func === 'Team_list' || func === 'Team_filter')) {
                        result = [...HARDCODED_TEAMS, ...result];
                        if (data && data.league_id) result = result.filter(t => t.league_id === data.league_id);
                    }
                    if ((func === 'Player_list' || func === 'Player_filter')) {
                        result = [...HARDCODED_PLAYERS, ...result];
                        if (data && data.current_team_id) {
                            result = result.filter(p => p.current_team_id === data.current_team_id);
                        }
                    }
                    if (func === 'Player_get') {
                        const local = HARDCODED_PLAYERS.find(p => p.id === data);
                        if (local) return resolve(local);
                    }
                    return resolve(result);
                };

                if (IS_GAS) {
                    google.script.run.withSuccessHandler(processResult).withFailureHandler(reject)[func](data);
                } else {
                    setTimeout(() => {
                        const entity = func.split('_')[0];
                        let table = entity.toLowerCase() + (entity.toLowerCase().endsWith('y') ? 'ies' : 's');
                        if (entity === 'GameEvent') table = 'events';
                        if (entity === 'Player') table = 'players';
                        if (entity === 'GameSetting') table = 'gamesettings';

                        const action = func.split('_')[1];

                        if (func === 'GameSetting_get') return processResult(MockData.gamesettings.find(s => s.league_id === data));
                        if (func === 'GameSetting_save') {
                            const existing = MockData.gamesettings.find(s => s.league_id === data.league_id);
                            if(existing) { existing.settings_json = data.settings_json; return processResult(existing); }
                            data.id = 'set_' + Date.now();
                            MockData.gamesettings.push(data);
                            return processResult(data);
                        }

                        if (action === 'create') {
                            data.id = 'new_' + Date.now();
                            if(MockData[table]) MockData[table].push(data);
                            return processResult(data);
                        }
                        if (action === 'filter') {
                            let res = MockData[table] || [];
                            for(let key in data) res = res.filter(item => item[key] == data[key]);
                            return processResult(res);
                        }
                        if (action === 'get') return processResult(MockData[table]?.find(i => i.id == data));
                        return processResult(MockData[table] || []);
                    }, 200);
                }
            })
        };

        const AppState = { currentView: 'dashboard', currentParams: null, currentLeagueId: null, leagues: [] };

        const DEFAULT_GAME_SETTINGS = {
            gameclock_active: { v: true, vis: true, ed: false, label: 'Gameclock Inschakelen', type: 'bool' },
            p1_length: { v: 20, vis: true, ed: true, label: 'Periode 1 Tijd (min)', type: 'num' },
            p2_length: { v: 20, vis: true, ed: true, label: 'Periode 2 Tijd (min)', type: 'num' },
            p3_length: { v: 20, vis: true, ed: true, label: 'Periode 3 Tijd (min)', type: 'num' },
            ot_length: { v: 5, vis: true, ed: true, label: 'Overtime Tijd (min)', type: 'num' },
            skip_ot: { v: false, vis: true, ed: true, label: 'Skip Overtime (Direct Shootout/Tie)', type: 'bool' },
            shootout_shooters: { v: 3, vis: true, ed: true, label: 'Shootout Aantal Schutters', type: 'select', opts: [1,3,5,7,9] },
            so_attempts: { v: 'Unique', vis: true, ed: true, label: 'SO Speler Limiet', type: 'select', opts: ['Rotate', 'Multiple', 'Unique', 'Random'] },
            ref_1: { v: true, vis: true, ed: true, label: 'Registreer Scheidsrechter 1', type: 'bool' },
            ref_2: { v: true, vis: true, ed: true, label: 'Registreer Scheidsrechter 2', type: 'bool' },
            shots_on_goal: { v: true, vis: true, ed: true, label: 'Registreer Shots on Goal (SOG)', type: 'bool' },
            faceoff_wins: { v: false, vis: true, ed: true, label: 'Registreer Team Face-offs', type: 'bool' },
            penalties_mode: { v: 'full', vis: true, ed: true, label: 'Penalty Registratie', type: 'select', opts: ['full', 'simple', 'none'] },
            goals_mode: { v: '2_assists', vis: true, ed: true, label: 'Goal Registratie', type: 'select', opts: ['2_assists', '1_assist', 'goal_only'] },
            export_csv: { v: true, vis: true, ed: false, label: 'Sta GameSheet Export Toe (.csv)', type: 'bool' }
        };

        const XP_THRESHOLDS = [0, 0, 50, 150, 300, 500, 800, 1200, 1800, 2500, 3500];
        const LEVEL_NAMES = { 1: 'Rookie', 2: 'Beginner', 3: 'Regular', 4: 'Veteran', 5: 'Expert', 6: 'Star', 7: 'All-Star', 8: 'Elite', 9: 'Legend', 10: 'GOAT' };

        function getLevel(xp = 0) {
            for (let i = XP_THRESHOLDS.length - 1; i >= 0; i--) { if (xp >= XP_THRESHOLDS[i]) return i === 0 ? 1 : i; }
            return 1;
        }
        function getXpProgress(xp = 0) {
            const level = getLevel(xp);
            if (level >= 10) return 100;
            return ((xp - XP_THRESHOLDS[level]) / (XP_THRESHOLDS[level + 1] - XP_THRESHOLDS[level])) * 100;
        }
        function formatTime(s) {
            if (typeof s !== 'number' || isNaN(s)) return '00:00';
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        }

        // ==========================================
        // 2. UI ENGINE
        // ==========================================
        async function initApp() {
            loadLogoFromDrive();
            const leagues = await api.call('League_list');
            AppState.leagues = leagues;
            const visible = leagues.filter(l => l.is_visible !== false);
            if (!AppState.currentLeagueId || !leagues.find(l => l.id === AppState.currentLeagueId)) {
                AppState.currentLeagueId = visible[0]?.id || leagues[0]?.id || null;
            }
            renderLeagueSwitchers();
            navigate(AppState.currentView, AppState.currentParams);
        }

        async function loadLogoFromDrive() {
            if (!LOGO_DRIVE_ID) return;
            try {
                const base64Data = await api.call('getDriveImageBase64', LOGO_DRIVE_ID);
                if (base64Data) document.getElementById('logo-container').innerHTML = `<img src="${base64Data}" class="w-full h-full object-cover" alt="Logo" />`;
            } catch (err) { console.error("Logo failed", err); }
        }

        function renderLeagueSwitchers() {
            const list = AppState.leagues.filter(l => l.is_visible !== false || l.id === AppState.currentLeagueId);
            const options = list.map(l => `<option value="${l.id}" ${l.id === AppState.currentLeagueId ? 'selected' : ''}>${l.name}</option>`).join('');
            const sw = document.getElementById('league-switcher');
            const msw = document.getElementById('mobile-league-switcher');
            if(sw) sw.innerHTML = options;
            if(msw) msw.innerHTML = options;
        }

        function changeLeague(id) {
            AppState.currentLeagueId = id;
            renderLeagueSwitchers();
            navigate(AppState.currentView, AppState.currentParams);
        }

        function renderNav() {
            const menu = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'live', label: 'Live Games', icon: 'radio' },
                { id: 'schedule', label: 'Schedule', icon: 'calendar' },
                { id: 'standings', label: 'Standings', icon: 'trophy' },
                { id: 'stats', label: 'Player Stats', icon: 'bar-chart-3' },
                { id: 'teams', label: 'Teams', icon: 'shield' },
                { id: 'players', label: 'Directory', icon: 'users' }
            ];
            document.getElementById('nav-menu').innerHTML = menu.map(item => `
                <a href="#" onclick="navigate('${item.id}')"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all
                   ${AppState.currentView === item.id
                       ? 'bg-primary/10 text-foreground'
                       : 'text-muted-foreground hover:bg-secondary hover:text-foreground'}">
                    <i data-lucide="${item.icon}" class="w-5 h-5 shrink-0"></i>
                    <span class="hidden lg:block">${item.label}</span>
                </a>`).join('');
            document.getElementById('nav-admin').innerHTML = `
                <a href="#" onclick="navigate('admin')"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all
                   ${AppState.currentView === 'admin' ? 'bg-primary/10 text-foreground' : 'text-muted-foreground hover:bg-secondary hover:text-foreground'}">
                    <i data-lucide="settings" class="w-5 h-5 shrink-0"></i>
                    <span class="hidden lg:block">Admin Panel</span>
                </a>`;
            lucide.createIcons();
        }

        function setView(html) {
            document.getElementById('app-view').innerHTML = html;
            lucide.createIcons();
        }

        function showModal(title, body, footer, large = false) {
            const html = `
            <div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/60 backdrop-blur-sm modal-backdrop" onclick="closeModal()"></div>
                <div class="relative bg-card rounded-xl shadow-2xl w-full ${large ? 'max-w-4xl' : 'max-w-md'} border border-border overflow-hidden flex flex-col max-h-[90vh] modal-content">
                    <div class="px-6 py-4 border-b border-border flex justify-between items-center bg-card/50 shrink-0">
                        <h2 class="text-lg font-bold text-foreground">${title}</h2>
                        <button onclick="closeModal()" class="p-2 text-muted-foreground hover:bg-secondary hover:text-foreground rounded-md transition-colors">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="p-6 overflow-y-auto custom-scrollbar flex-1 text-sm">${body}</div>
                    ${footer ? `<div class="px-6 py-4 border-t border-border bg-card/30 flex justify-end gap-3 shrink-0">${footer}</div>` : ''}
                </div>
            </div>`;
            document.getElementById('modal-root').innerHTML = html;
            lucide.createIcons();
        }
        function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

        // ==========================================
        // 3. CRUD MODALS
        // ==========================================
        function openSettingsModal() {
            const isHidden = localStorage.getItem('hide_standard_league') === 'true';
            const body = `
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-secondary/50 rounded-lg border border-border">
                        <div class="pr-4">
                            <h3 class="font-bold">Standard League (Fallback)</h3>
                            <p class="text-xs text-muted-foreground mt-1">Show built-in league if database is empty.</p>
                        </div>
                        <input type="checkbox" id="toggle-std-league" class="w-5 h-5 rounded border-border bg-secondary accent-papaya" ${!isHidden ? 'checked' : ''}>
                    </div>
                </div>`;
            const footer = `<button onclick="closeModal()" class="px-4 py-2 text-xs font-semibold text-muted-foreground hover:text-foreground transition-colors">Cancel</button>
                           <button onclick="saveSettings()" class="px-5 py-2 text-xs font-bold text-primary-foreground bg-primary rounded-md">Save Changes</button>`;
            showModal('General Settings', body, footer);
        }
        function saveSettings() {
            const chk = document.getElementById('toggle-std-league').checked;
            localStorage.setItem('hide_standard_league', !chk ? 'true' : 'false');
            initApp(); closeModal();
        }

        let currentEditingSettings = {};
        async function openGameSettingsModal() {
            const settingsObj = await api.call('GameSetting_get', AppState.currentLeagueId);
            currentEditingSettings = settingsObj && settingsObj.settings_json
                ? { ...DEFAULT_GAME_SETTINGS, ...JSON.parse(settingsObj.settings_json) }
                : JSON.parse(JSON.stringify(DEFAULT_GAME_SETTINGS));

            let htmlRows = '';
            for (const [key, config] of Object.entries(currentEditingSettings)) {
                let inputHtml = '';
                if (config.type === 'bool') {
                    inputHtml = `<input type="checkbox" onchange="updateSettingState('${key}', 'v', this.checked)" ${config.v ? 'checked' : ''} class="accent-papaya w-4 h-4">`;
                } else if (config.type === 'num') {
                    inputHtml = `<input type="number" value="${config.v}" onchange="updateSettingState('${key}', 'v', this.value)" class="w-20 bg-secondary border border-border rounded px-2 py-1 text-center outline-none">`;
                } else if (config.type === 'select') {
                    const opts = config.opts.map(o => `<option value="${o}" ${o == config.v ? 'selected' : ''}>${o}</option>`).join('');
                    inputHtml = `<select onchange="updateSettingState('${key}', 'v', this.value)" class="bg-secondary border border-border rounded px-2 py-1 outline-none">${opts}</select>`;
                }

                htmlRows += `
                <div class="flex items-center justify-between p-3 border-b border-border/50 hover:bg-white/5 transition-colors">
                    <div class="flex-1 pr-4">
                        <p class="font-bold text-foreground text-xs uppercase tracking-wider">${config.label}</p>
                        <p class="text-[9px] text-muted-foreground font-mono mt-0.5">${key}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="min-w-[100px] flex justify-end">${inputHtml}</div>
                        <button onclick="toggleSettingIcon('${key}', 'vis', this)" class="p-1.5 rounded transition-colors ${config.vis ? 'text-papaya bg-papaya/10' : 'text-muted-foreground bg-secondary'}">
                            <i data-lucide="${config.vis ? 'eye' : 'eye-off'}" class="w-3.5 h-3.5"></i>
                        </button>
                        <button onclick="toggleSettingIcon('${key}', 'ed', this)" class="p-1.5 rounded transition-colors ${config.ed ? 'text-green-500 bg-green-500/10' : 'text-red-500 bg-red-500/10'}">
                            <i data-lucide="${config.ed ? 'unlock' : 'lock'}" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>`;
            }

            const body = `
                <div class="bg-card border border-border rounded-lg overflow-hidden">
                    <div class="flex items-center justify-between p-3 bg-secondary/50 border-b border-border text-[10px] font-black uppercase tracking-widest text-muted-foreground">
                        <span>Setting</span>
                        <div class="flex items-center gap-4 pr-1">
                            <span class="w-[100px] text-right">Value</span>
                            <span class="w-6 text-center">Vis</span>
                            <span class="w-6 text-center">Edi</span>
                        </div>
                    </div>
                    ${htmlRows}
                </div>`;
            const footer = `<button onclick="closeModal()" class="px-4 py-2 text-xs font-semibold text-muted-foreground">Cancel</button>
                           <button onclick="saveGameSettings(event)" class="px-5 py-2 text-xs font-bold text-primary-foreground bg-primary rounded-md">Save Rules</button>`;
            showModal('Game Rules & Settings', body, footer, true);
        }

        function updateSettingState(k, f, v) { currentEditingSettings[k][f] = v; }
        function toggleSettingIcon(k, f, btn) {
            currentEditingSettings[k][f] = !currentEditingSettings[k][f];
            const v = currentEditingSettings[k][f];
            if (f === 'vis') { btn.className = `p-1.5 rounded transition-colors ${v ? 'text-papaya bg-papaya/10' : 'text-muted-foreground bg-secondary'}`; btn.innerHTML = `<i data-lucide="${v ? 'eye' : 'eye-off'}" class="w-3.5 h-3.5"></i>`; }
            else { btn.className = `p-1.5 rounded transition-colors ${v ? 'text-green-500 bg-green-500/10' : 'text-red-500 bg-red-500/10'}`; btn.innerHTML = `<i data-lucide="${v ? 'unlock' : 'lock'}" class="w-3.5 h-3.5"></i>`; }
            lucide.createIcons();
        }
        async function saveGameSettings(e) {
            await api.call('GameSetting_save', { league_id: AppState.currentLeagueId, settings_json: JSON.stringify(currentEditingSettings) });
            closeModal();
        }

        async function openTeamModal() {
            const allTeams = await api.call('Team_list');
            const parentOptions = `<option value="">None (Independent)</option>` + allTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            const body = `
                <div class="space-y-4">

        async function viewStats() {
            const [players, teams, events] = await Promise.all([ api.call('Player_list'), api.call('Team_list'), api.call('GameEvent_list') ]);
            const tm = Object.fromEntries(teams.map(t => [t.id, t]));
            const relevant = players.filter(p => !p.current_team_id || (tm[p.current_team_id] && tm[p.current_team_id].league_id === AppState.currentLeagueId));
            const sm = {};
            relevant.forEach(p => sm[p.id] = { ...p, gp: p.games_played||0, g:0, a:0, pim:0, pts:0 });
            events.forEach(e => {
                if (e.event_type === 'Goal') {
                    if (sm[e.player_id]) { sm[e.player_id].g++; sm[e.player_id].pts++; }
                    if (sm[e.assist1_player_id]) { sm[e.assist1_player_id].a++; sm[e.assist1_player_id].pts++; }
                    if (sm[e.assist2_player_id]) { sm[e.assist2_player_id].a++; sm[e.assist2_player_id].pts++; }
                } else if (e.event_type === 'Penalty' && sm[e.player_id]) sm[e.player_id].pim += (e.penalty_minutes||0);
            });
            const sorted = Object.values(sm).sort((a,b) => b.pts - a.pts || b.g - a.g);
            const rows = sorted.map((p, i) => {
                const team = tm[p.current_team_id];
                const trPercent = p.training_total > 0 ? Math.round((p.training_attended/p.training_total)*100) : 0;
                const trColor = trPercent >= 80 ? 'text-green-500' : (trPercent >= 50 ? 'text-orange-500' : 'text-red-500');
                return `<tr class="border-t border-border hover:bg-secondary/30 cursor-pointer" onclick="navigate('playerStats', '${p.id}')">
                    <td class="p-4 text-muted-foreground font-mono text-xs">${i+1}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded bg-secondary flex items-center justify-center font-mono text-[10px] font-black">${p.jersey_number||'?'}</div>
                            <div><p class="font-bold text-sm leading-none">${p.first_name} ${p.last_name}</p><p class="text-[9px] text-muted-foreground uppercase mt-1 tracking-widest">${p.position||'UNK'} · ${team?.short_name||'FA'}</p></div>
                        </div>
                    </td>
                    <td class="p-4 text-center font-mono text-xs">${p.gp}</td>
                    <td class="p-4 text-center font-mono text-sm font-black text-papaya">${p.pts}</td>
                    <td class="p-4 text-center font-mono text-xs">${p.g}</td>
                    <td class="p-4 text-center font-mono text-xs">${p.a}</td>
                    <td class="p-4 text-center font-mono text-xs text-muted-foreground">${p.pim}</td>
                    <td class="p-4 text-muted-foreground italic text-[10px] truncate max-w-[100px]">${p.stick_model||'-'}</td>
                    <td class="p-4 text-center font-black text-xs ${trColor}">${trPercent}%</td>
                </tr>`;
            }).join('');
            setView(`
                <div class="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                    <h1 class="text-3xl font-black">Player Statistics</h1>
                    <div class="bg-card border border-border rounded-xl overflow-hidden shadow-2xl">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-secondary/50 text-[9px] font-black uppercase tracking-[0.2em] text-muted-foreground">
                                    <tr><th class="p-4 w-12">#</th><th class="p-4">Player</th><th class="p-4 text-center">GP</th><th class="p-4 text-center text-foreground">PTS</th><th class="p-4 text-center">G</th><th class="p-4 text-center">A</th><th class="p-4 text-center">PIM</th><th class="p-4">Stick</th><th class="p-4 text-center">Attendance</th></tr>
                                </thead>
                                <tbody>${rows || '<tr><td colspan="9" class="p-20 text-center text-muted-foreground font-medium italic">No player stats.</td></tr>'}</tbody>
                            </table>
                        </div>
                    </div>
                </div>`);
        }

        async function viewStandings() {
            const [games, teams] = await Promise.all([ api.call('Game_filter', { league_id: AppState.currentLeagueId }), api.call('Team_filter', { league_id: AppState.currentLeagueId }) ]);
            let st = {}; teams.forEach(t => st[t.id] = { t, gp:0, w:0, l:0, pts:0 });
            games.forEach(g => {
                if (g.status !== 'Final') return;
                let h = st[g.home_team_id], a = st[g.away_team_id];
                if(h) { h.gp++; if(g.home_score > g.away_score) { h.w++; h.pts+=2; } else if (g.home_score === g.away_score) h.pts++; else h.l++; }
                if(a) { a.gp++; if(g.away_score > g.home_score) { a.w++; a.pts+=2; } else if (g.home_score === g.away_score) a.pts++; else a.l++; }
            });
            const sorted = Object.values(st).sort((a,b) => b.pts - a.pts);
            const rows = sorted.map((s, i) => `<tr class="border-t border-border hover:bg-secondary/30 transition-colors">
                <td class="p-4 text-muted-foreground font-mono text-xs">${i+1}</td>
                <td class="p-4"><div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black" style="background:${s.t.color}; color:#000">${(s.t.short_name||'T')[0]}</div><span class="font-bold truncate text-sm">${s.t.name}</span></div></td>
                <td class="p-4 text-center font-mono text-xs">${s.gp}</td>
                <td class="p-4 text-center font-mono text-xs text-green-500 font-bold">${s.w}</td>
                <td class="p-4 text-center font-mono text-xs text-red-500 font-bold">${s.l}</td>
                <td class="p-4 text-center font-mono text-sm font-black text-foreground">${s.pts}</td>
            </tr>`).join('');
            setView(`<div class="max-w-5xl mx-auto space-y-8 animate-in fade-in duration-500"><h1 class="text-3xl font-black">Standings</h1><div class="bg-card border border-border rounded-xl overflow-hidden shadow-2xl"><div class="overflow-x-auto"><table class="w-full text-left"><thead class="bg-secondary/50 text-[10px] font-black uppercase tracking-[0.2em] text-muted-foreground"><tr><th class="p-4 w-12">#</th><th class="p-4">Team</th><th class="p-4 text-center">GP</th><th class="p-4 text-center">W</th><th class="p-4 text-center">L</th><th class="p-4 text-center text-foreground">PTS</th></tr></thead><tbody>${rows || '<tr><td colspan="6" class="p-16 text-center text-muted-foreground italic">No results.</td></tr>'}</tbody></table></div></div></div>`);
        }

            const cards = games.map(g => {
                const h = tm[g.home_team_id] || {}, a = tm[g.away_team_id] || {};
                return `<div onclick="navigate('gameDetail', '${g.id}')" class="bg-card border border-papaya/20 rounded-xl overflow-hidden shadow-2xl hover:border-papaya/50 transition-all cursor-pointer group"><div class="bg-papaya/5 px-5 py-2.5 flex justify-between border-b border-papaya/10 items-center"><div class="flex items-center gap-2.5"><span class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></span><span class="text-[10px] font-black tracking-[0.2em] text-red-500">LIVE</span></div><span class="font-clock text-[11px] font-black text-papaya">PER ${g.current_period} / ${formatTime(g.period_time_remaining)}</span></div><div class="p-8 flex items-center justify-between text-center relative overflow-hidden"><div class="flex-1 z-10"><div class="w-14 h-14 rounded-full mx-auto mb-4 flex items-center justify-center font-black text-sm border-2 border-border shadow-lg" style="background:${h.color}; color:#000">${(h.short_name||'H')[0]}</div><p class="text-[10px] font-black text-muted-foreground uppercase truncate">${h.name}</p><p class="text-4xl font-black text-foreground mt-2">${g.home_score||0}</p></div><div class="px-6 text-muted-foreground/20 font-black italic text-xl z-10">VS</div><div class="flex-1 z-10"><div class="w-14 h-14 rounded-full mx-auto mb-4 flex items-center justify-center font-black text-sm border-2 border-border shadow-lg" style="background:${a.color}; color:#000">${(a.short_name||'A')[0]}</div><p class="text-[10px] font-black text-muted-foreground uppercase truncate">${a.name}</p><p class="text-4xl font-black text-foreground mt-2">${g.away_score||0}</p></div></div></div>`;
            }).join('');
            setView(`<div class="max-w-5xl mx-auto space-y-10 animate-in fade-in duration-500"><h1 class="text-3xl font-black">Live Scoreboard</h1><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">${cards}</div></div>`);
        }

        async function viewSchedule() {
            const games = await api.call('Game_filter', { league_id: AppState.currentLeagueId });
            const teams = await api.call('Team_list');
            const tm = Object.fromEntries(teams.map(t => [t.id, t]));
            const list = games.map(g => {
                const h = tm[g.home_team_id], a = tm[g.away_team_id];
                return `<div class="flex items-center justify-between p-5 bg-card border border-border rounded-xl mb-4 hover:bg-secondary/20 transition-all"><div class="flex items-center gap-6 flex-1 min-w-0"><div class="text-center min-w-[80px] pr-6 border-r border-border shrink-0"><p class="text-base font-mono font-black text-foreground">${g.scheduled_date ? new Date(g.scheduled_date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'TBD'}</p><p class="text-[10px] font-black text-muted-foreground uppercase mt-1 tracking-widest">${g.status}</p></div><div class="min-w-0"><p class="font-black text-lg truncate">${h?.name||'TBD'} <span class="text-muted-foreground/30 mx-2 italic font-normal text-sm">vs</span> ${a?.name||'TBD'}</p><p class="text-[10px] font-black text-muted-foreground uppercase mt-1 tracking-[0.2em]">${g.venue||'TBA'} <span class="text-papaya/50 mx-2">•</span> ${g.game_type||'Match'}</p></div></div><div class="text-right pl-6 shrink-0">${g.status === 'Final' ? `<div class="bg-secondary px-4 py-2 rounded-lg font-mono font-black text-lg text-foreground border border-border">${g.home_score} - ${g.away_score}</div>` : g.status === 'Live' ? `<button onclick="navigate('gameDetail', '${g.id}')" class="px-5 py-2 rounded-lg text-[10px] font-black tracking-[0.2em] bg-red-600 text-white shadow-xl">WATCH</button>` : `<button class="px-5 py-2 bg-secondary text-muted-foreground text-[10px] font-black rounded-lg border border-border uppercase tracking-widest">Details</button>`}</div></div>`;
            }).join('');
            setView(`<div class="max-w-4xl mx-auto space-y-10 animate-in fade-in duration-500"><div class="flex justify-between items-center"><h1 class="text-3xl font-black">Schedule</h1><button onclick="openGameModal()" class="px-4 py-2 bg-secondary text-foreground text-xs font-bold rounded-md flex items-center gap-2 border border-border hover:bg-accent transition-colors uppercase tracking-widest"><i data-lucide="plus" class="w-3 h-3"></i> Schedule</button></div><div>${list || '<p class="text-center text-muted-foreground py-32 italic">No matches scheduled.</p>'}</div></div>`);
        }

        async function viewGameDetail(id) {
            const [g, evs, ts, ps] = await Promise.all([ api.call('Game_get', id), api.call('GameEvent_filter', { game_id: id }), api.call('Team_list'), api.call('Player_list') ]);
            const tm = Object.fromEntries(ts.map(t => [t.id, t]));
            const pm = Object.fromEntries(ps.map(p => [p.id, p]));
            const h = tm[g.home_team_id] || {}, a = tm[g.away_team_id] || {};
            const evHtml = evs.length === 0 ? '<p class="text-xs text-muted-foreground py-16 text-center italic">No events.</p>' :
                evs.map(e => {
                    const p = pm[e.player_id];
                    const icon = e.event_type === 'Goal' ? '🚨' : e.event_type === 'Penalty' ? '⚠️' : '🏒';
                    return `<div class="flex items-center gap-4 p-4 rounded-xl border border-border bg-secondary/10 mb-3"><div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-xl shrink-0 border border-border">${icon}</div><div class="flex-1 min-w-0"><p class="font-bold text-sm text-foreground">${e.event_type} ${p ? `<span class="text-papaya mx-1.5">•</span> #${p.jersey_number} ${p.last_name}` : ''}</p><p class="text-[10px] text-muted-foreground font-black uppercase tracking-widest mt-1">Period ${e.period} | ${e.game_time || ''}</p></div></div>`;
                }).join('');
            setView(`
                <div class="max-w-4xl mx-auto space-y-8 animate-in slide-in-from-bottom-6 duration-500 pb-12">
                    <button onclick="navigate('live')" class="flex items-center text-[10px] font-black text-muted-foreground hover:text-foreground bg-secondary/50 px-4 py-2 rounded-lg border border-border uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back</button>
                    <div class="rounded-2xl border border-border bg-card p-12 shadow-2xl text-center relative overflow-hidden">
                        <div class="inline-block px-6 py-2 rounded-full bg-background border border-border font-clock text-sm font-black mb-10 tracking-widest shadow-inner">${g.status === 'Final' ? 'FINAL' : `PER ${g.current_period} • ${formatTime(g.period_time_remaining)}`}</div>
                        <div class="flex items-center justify-between gap-4">
                            <div class="flex-1"><div class="w-24 h-24 rounded-3xl mx-auto mb-6 flex items-center justify-center text-4xl font-black border-2 border-border shadow-2xl transform -rotate-3" style="background:${h.color}; color:#000">${(h.short_name||'H')[0]}</div><h3 class="text-[11px] font-black text-muted-foreground uppercase tracking-[0.3em] truncate">${h.name}</h3><p class="text-8xl font-black text-foreground tracking-tighter">${g.home_score || 0}</p></div>
                            <div class="text-4xl font-black text-muted-foreground/10 italic px-4 shrink-0 mt-8">VS</div>
                            <div class="flex-1"><div class="w-24 h-24 rounded-3xl mx-auto mb-6 flex items-center justify-center text-4xl font-black border-2 border-border shadow-2xl transform rotate-3" style="background:${a.color}; color:#000">${(a.short_name||'A')[0]}</div><h3 class="text-[11px] font-black text-muted-foreground uppercase tracking-[0.3em] truncate">${a.name}</h3><p class="text-8xl font-black text-foreground tracking-tighter">${g.away_score || 0}</p></div>
                        </div>
                    </div>
                    <div class="bg-card border border-border rounded-2xl p-8"><h2 class="text-lg font-black uppercase tracking-[0.2em] text-foreground mb-8 border-b border-border pb-6">Play-by-Play</h2><div class="max-h-[600px] overflow-y-auto pr-3 custom-scrollbar">${evHtml}</div></div>
                </div>`);
        }

        async function viewPlayerStats(id) {
            const [p, ts, evs] = await Promise.all([ api.call('Player_get', id), api.call('Team_list'), api.call('GameEvent_list') ]);
            if (!p) return setView('<div class="p-20 text-center font-bold text-red-500">Player not found.</div>');
            const team = ts.find(t => t.id === p.current_team_id) || { name: 'Free Agent', color: '#1a1a1a' };
            const level = getLevel(p.xp), prog = getXpProgress(p.xp), title = LEVEL_NAMES[level];
            let goals = 0, assists = 0, pim = 0;
            evs.forEach(e => { if (e.event_type === 'Goal') { if (e.player_id === id) goals++; else if (e.assist1_player_id === id || e.assist2_player_id === id) assists++; } else if (e.event_type === 'Penalty' && e.player_id === id) pim += (e.penalty_minutes || 0); });
            setView(`
                <div class="max-w-4xl mx-auto space-y-10 animate-in slide-in-from-bottom-6 duration-500">
                    <button onclick="navigate('stats')" class="flex items-center text-[10px] font-black text-muted-foreground hover:text-foreground bg-secondary/50 px-4 py-2 rounded-lg border border-border uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Stats</button>
                    <div class="bg-card border border-border p-10 rounded-2xl flex items-center gap-10 relative overflow-hidden shadow-2xl">
                        <div class="w-32 h-32 lg:w-44 lg:h-44 rounded-3xl flex items-center justify-center font-black text-7xl border-4 border-border shadow-2xl z-10 shrink-0 transform -rotate-3" style="background:${team.color}; color:#000">${p.jersey_number || '?'}</div>
                        <div class="z-10 min-w-0"><h1 class="text-4xl lg:text-6xl font-black truncate leading-none tracking-tight">${p.first_name}<br>${p.last_name}</h1><p class="text-[11px] font-black text-papaya tracking-[0.4em] uppercase mt-4 flex items-center gap-3"><span class="w-2 h-2 rounded-full bg-papaya"></span> ${p.position || 'UNK'} · ${team.name}</p></div>
                    </div>
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="md:col-span-3 bg-card border border-border p-8 rounded-2xl shadow-xl"><div class="flex justify-between items-end mb-6"><div><p class="text-[11px] font-black text-muted-foreground uppercase tracking-[0.2em] mb-2">Progression</p><p class="text-2xl font-black text-foreground">Level ${level} | ${title}</p></div><div class="text-right"><p class="text-4xl font-black text-papaya tracking-tighter">${p.xp || 0} <span class="text-[10px] text-muted-foreground uppercase ml-1">XP</span></p></div></div><div class="h-3 bg-secondary rounded-full overflow-hidden border border-border shadow-inner"><div class="h-full xp-gradient transition-all duration-1000" style="width: ${prog}%"></div></div></div>
                        <div class="bg-card border border-border p-8 rounded-2xl text-center shadow-lg"><p class="text-[11px] font-black text-muted-foreground uppercase mb-3">Goals</p><p class="text-5xl font-black text-foreground">${goals}</p></div>
                        <div class="bg-card border border-border p-8 rounded-2xl text-center shadow-lg"><p class="text-[11px] font-black text-muted-foreground uppercase mb-3">Assists</p><p class="text-5xl font-black text-foreground">${assists}</p></div>
                        <div class="bg-card border border-border p-8 rounded-2xl text-center shadow-lg"><p class="text-[11px] font-black text-muted-foreground uppercase mb-3">Points</p><p class="text-5xl font-black text-papaya">${goals + assists}</p></div>
                    </div>
                </div>`);
        }

        // ==========================================
        // 5. ROUTER & BOOTSTRAP
        // ==========================================
        async function navigate(view, params = null) {
            AppState.currentView = view; AppState.currentParams = params; renderNav();
            document.getElementById('app-view').innerHTML = `<div class="flex items-center justify-center h-full"><div class="w-10 h-10 border-4 border-primary/10 border-t-papaya rounded-full animate-spin"></div></div>`;
            try {
                if (view === 'dashboard') await viewDashboard();
                else if (view === 'admin') await viewAdmin();
                else if (view === 'live') await viewLiveGames();
                else if (view === 'gameDetail') await viewGameDetail(params);
                else if (view === 'standings') await viewStandings();
                else if (view === 'players') await viewPlayers();
                else if (view === 'playerStats') await viewPlayerStats(params);
                else if (view === 'stats') await viewStats();
                else if (view === 'teams') await viewTeams();
                else if (view === 'schedule') await viewSchedule();
                else await viewDashboard();
            } catch (err) {
                console.error(err);
                document.getElementById('app-view').innerHTML = `<div class="p-12 border border-red-500/30 bg-red-500/5 rounded-2xl text-center max-w-lg mx-auto mt-20 text-red-500 font-bold shadow-2xl">Error: ${err.message}</div>`;
            }
            lucide.createIcons(); document.getElementById('app-view').scrollTo(0,0);
        }
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
